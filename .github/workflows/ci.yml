name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.30.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & Format Check (Biome)
        run: pnpm run check

      - name: Type Check (tsgo)
        run: pnpm run tsc

      - name: Build
        run: pnpm run build
        env:
          VITE_FIREBASE_API_KEY: "dummy_key"
          VITE_FIREBASE_AUTH_DOMAIN: "dummy.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "dummy"
          VITE_FIREBASE_STORAGE_BUCKET: "dummy.appspot.com"
          VITE_CONVEX_URL: "https://dummy.convex.cloud"
          VITE_CONVEX_SITE_URL: "https://dummy.convex.site"
          MICROCMS_SERVICE_DOMAIN: "dummy"
          MICROCMS_API_KEY: "dummy"

      - name: Run Tests (Vitest)
        run: pnpm run test
